name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Download PMTiles asset from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Hosta PMTiles same-origin via Pages för att undvika CORS-blockering
          # på Azure Blob-redirect (saknar Access-Control-Allow-Origin).
          # Filen följer med varje deploy men ligger inte i git.
          mkdir -p public
          gh release download tiles-v2 \
            --repo "${{ github.repository }}" \
            --pattern 'sweden-natur.pmtiles' \
            --output public/sweden-natur.pmtiles
          ls -lh public/sweden-natur.pmtiles
      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
