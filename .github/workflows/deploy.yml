name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Download PMTiles assets from Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Hosta PMTiles same-origin via Pages för att undvika CORS-blockering
          # på Azure Blob-redirect (saknar Access-Control-Allow-Origin).
          # Filer följer med varje deploy men ligger inte i git.
          mkdir -p public

          gh release download tiles-v2 \
            --repo "${{ github.repository }}" \
            --pattern 'sweden-natur.pmtiles' \
            --output public/sweden-natur.pmtiles

          # Contours är optional — om release inte finns än, hoppa över
          # (frontend tolererar missing contours-source och visar bara
          # hillshade-läget tills build-contours-workflow har körts).
          if gh release view tiles-contours-v1 --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release download tiles-contours-v1 \
              --repo "${{ github.repository }}" \
              --pattern 'sweden-contours.pmtiles' \
              --output public/sweden-contours.pmtiles
          else
            echo "tiles-contours-v1 saknas — hoppar över. Kör build-contours.yml."
          fi

          ls -lh public/*.pmtiles 2>/dev/null || true
      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
